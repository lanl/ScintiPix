id: NaI-Tl
name: NaI(Tl)
description: >
  SSLG4-derived iodide scintillator entry from isc-2004 (NaITI).
  The thallium dopant mass fraction is inherited from SSLG4 and has not been
  confirmed against a manufacturer composition specification.
  Optical constants come from sslg4/macros/iscnt/isc-2004.mac.
  SSLG4 does not define ABSLENGTH for this material; a large flat
  placeholder (1e6 cm) is used to emulate no explicit absorption limit.

composition:
  density:
    value: 3.67
    unit: g/cm3
  elements:
    - symbol: Na
      massFraction: 0.152000
    - symbol: I
      massFraction: 0.838000
    - symbol: Tl
      massFraction: 0.010000

optical:
  curves:
    rIndex:
      path: curves/NaI-Tl/rindex.csv
      xUnit: eV
      yUnit: unitless
    absLength:
      path: curves/NaI-Tl/abs_length_cm.csv
      xUnit: eV
      yUnit: cm
    scintSpectrum:
      path: curves/NaI-Tl/scint_spectrum.csv
      xUnit: eV
      yUnit: unitless
  constants:
    scintYield:
      value: 41000.0
      unit: 1/MeV
    resolutionScale: 1.0
    timeComponents:
      default:
        - timeConstant: {value: 630.0, unit: ns}
          yieldFraction: 1.0
        - timeConstant: {value: 0.0, unit: ns}
          yieldFraction: 0.0
        - timeConstant: {value: 0.0, unit: ns}
          yieldFraction: 0.0
