id: EJ-426
name: EJ-426
description: >
  Eljen EJ-426 entry sourced from SSLG4 (opsc-133 / EJ426Builder).
  SSLG4 defines enriched lithium as Li-6 95 atom % and Li-7 5 atom %.
  Composition follows the PNNL IAT-validation 1:4 LiF:ZnS screen model at
  2.42 g/cm3 used by EJ426Builder; it is not a manufacturer-exact EJ-426
  formulation. Eljen publishes 1:3 and 1:2 product variants. The silver
  activator is absent from the PNNL source composition.

composition:
  density:
    value: 2.42
    unit: g/cm3
  elements:
    - symbol: Li
      massFraction: 0.0393
      isotopes:
        - massNumber: 6
          atomFraction: 0.95
        - massNumber: 7
          atomFraction: 0.05
    - symbol: F
      massFraction: 0.1231
    - symbol: Zn
      massFraction: 0.4358
    - symbol: S
      massFraction: 0.2137
    - symbol: Si
      massFraction: 0.0769
    - symbol: C
      massFraction: 0.0657
    - symbol: H
      massFraction: 0.0017
    - symbol: O
      massFraction: 0.0438

optical:
  curves:
    rIndex:
      path: curves/EJ-426/rindex.csv
      xUnit: eV
      yUnit: unitless
    absLength:
      path: curves/EJ-426/abs_length_cm.csv
      xUnit: eV
      yUnit: cm
    scintSpectrum:
      path: curves/EJ-426/scint_spectrum.csv
      xUnit: eV
      yUnit: unitless
  constants:
    scintYield:
      value: 40000.0
      unit: 1/MeV
    resolutionScale: 1.0
    timeComponents:
      default:
        - timeConstant: {value: 200.0, unit: ns}
          yieldFraction: 1.0
        - timeConstant: {value: 0.0, unit: ns}
          yieldFraction: 0.0
        - timeConstant: {value: 0.0, unit: ns}
          yieldFraction: 0.0
