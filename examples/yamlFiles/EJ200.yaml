# Scintillator catalog override example.
#
# Purpose:
# - Use catalogId=EJ200 as the baseline scintillator definition.
# - Override only a subset of optical/material properties in-line.
# - Let ConfigIO auto-populate the remaining required properties.

scintillator:
  catalogId: EJ200
  position_mm:
    x_mm: 0.0
    y_mm: 0.0
    z_mm: 0.0
  dimension_mm:
    x_mm: 100.0
    y_mm: 100.0
    z_mm: 20.0
  maskRadius: 18.0
  properties:
    density: 1.05
    absLength: [420.0, 420.0, 340.0, 260.0, 180.0]
    scintSpectrum: [0.04, 0.30, 1.00, 0.52, 0.12]
    timeComponents:
      default:
        - timeConstant: 2.4
          yieldFraction: 1.0
        - timeConstant: 0.0
          yieldFraction: 0.0
        - timeConstant: 0.0
          yieldFraction: 0.0
    scintYield: 9800.0
    resolutionScale: 1.1

source:
  gps:
    particle: neutron
    position:
      type: Plane
      shape: Circle
      centerMm:
        x_mm: 0.0
        y_mm: 0.0
        z_mm: -100.0
      radiusMm: 10.0
    angular:
      type: beam2d
      rot1: {x: 1.0, y: 0.0, z: 0.0}
      rot2: {x: 0.0, y: 1.0, z: 0.0}
      direction: {x: 0.0, y: 0.0, z: 1.0}
    energy:
      type: Mono
      monoMeV: 6.0

optical:
  lenses:
    - catalogId: CanonEF50mmf1.0L
      primary: true
  geometry:
    entranceDiameter: 60.55
    sensorMaxWidth: 36.0
  sensitiveDetectorConfig:
    position_mm:
      x_mm: 0.0
      y_mm: 0.0
      z_mm: 210.05
    shape: circle
    diameterRule: min(entranceDiameter,sensorMaxWidth)
  showTransportProgress: true

intensifier:
  model: Cricket2
  input_screen:
    image_circle_diameter_mm: 18.0
    center_mm: [0.0, 0.0]
    magnification: 1.0
    coordinate_frame: intensifier_input_plane
    notes: Cricket2 nominal image-circle diameter and 1:1 magnification.

sensor:
  model: Timepix3
  timepix:
    pixels_x: 256
    pixels_y: 256
    pixel_pitch_mm: 0.055
    max_tot_ns: 25550.0
    dead_time_ns: 475.0

simulation:
  numberOfParticles: 5000
  runtimeControls:
    controlVerbose: 0
    runVerbose: 0
    eventVerbose: 0
    trackingVerbose: 0
    printProgress: 500

runner:
  binary: g4emi
  showProgress: true
  verifyOutput: true

Metadata:
  author: Alex Long
  date: 2026-02-24
  version: ScintPiX v0.1
  description: Catalog-based EJ200 example with intensifier and Timepix3 sensor.
  RunEnvironment:
    WorkingDirectory: data
    SimulationRunID: ScintCatalog_example
    MacroDirectory: macros
    LogDirectory: logs
    OutputInfo:
      SimulatedPhotonsDirectory: simulatedPhotons
      TransportedPhotonsDirectory: transportedPhotons
